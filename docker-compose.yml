# 玩家日志统计 Docker 部署配置
#
# GitHub Actions 会把后端和前端构建成 Docker 镜像并推送到 GHCR。
# 服务器部署时不需要本地编译，直接执行：
#
#   docker compose pull
#   docker compose up -d
#
# 默认入口：
#   玩家详情 / 分享页 / AstrBot 接口：http://服务器IP:9493
#   管理后台：http://服务器IP:8843
#
# 生产环境请先修改带“建议修改”的密码和密钥。

services:
  mysql:
    image: mysql:8.4
    container_name: player-stats-mysql
    restart: always
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: player_stats
      MYSQL_USER: player_stats
      # 建议修改：数据库普通用户密码。已有 docker-data/mysql 时，改这里不会自动改旧库密码。
      MYSQL_PASSWORD: mysql123ll
      # 建议修改：数据库 root 密码。已有 docker-data/mysql 时，改这里不会自动改旧库密码。
      MYSQL_ROOT_PASSWORD: mysql123ll
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    image: ghcr.io/jmcat999/player-backend:latest
    container_name: player-stats-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8080

      PLAYER_STATS_DATASOURCE_URL: jdbc:mysql://mysql:3306/player_stats?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true&createDatabaseIfNotExist=true
      PLAYER_STATS_DATASOURCE_USERNAME: player_stats
      # 必须和 mysql 服务里的 MYSQL_PASSWORD 保持一致。
      PLAYER_STATS_DATASOURCE_PASSWORD: mysql123ll

      APP_ADMIN_USERNAME: admin
      # 建议修改：后台管理员初始密码。账号已创建后，改这里不会覆盖旧密码。
      APP_ADMIN_PASSWORD: admin123456
      # 建议修改：登录 token 签名密钥，换成一段随机长字符串。
      APP_ADMIN_JWT_SECRET: change-me-to-a-long-random-secret
      APP_ADMIN_TOKEN_TTL_DAYS: 7

      PLAYER_LOGS_ZONE_ID: Asia/Shanghai
      PLAYER_LOGS_IMPORTER_AUTO_RUN: true
      PLAYER_LOGS_IMPORTER_CRON: 0 30 0 * * *
      PLAYER_LOGS_IMPORTER_SKIP_TODAY: true
      PLAYER_LOGS_IMPORTER_MAX_FILES_PER_RUN: 1000
      PLAYER_LOGS_ARCHIVE_DIRECTORY: /data/synced-logs

      PLAYER_LOGS_MAIN_TYPE: LOCAL
      PLAYER_LOGS_MAIN_DIRECTORY: /data/synced-logs/main
      PLAYER_LOGS_MAIN_FILE_GLOB: player_actions_*.csv
      PLAYER_LOGS_MAIN_RECURSIVE: false
      PLAYER_LOGS_MAIN_ENABLED: true

      PLAYER_LOGS_SUB_TYPE: LOCAL
      PLAYER_LOGS_SUB_DIRECTORY: /data/synced-logs/sub
      PLAYER_LOGS_SUB_FILE_GLOB: player_actions_*.csv
      PLAYER_LOGS_SUB_RECURSIVE: false
      PLAYER_LOGS_SUB_ENABLED: true

      PLAYER_LOGS_LOCAL_DIRECTORY: /data/synced-logs

      # SMB 远程复制。默认关闭，只解析 ./docker-data/synced-logs 里的本地 CSV。
      PLAYER_LOGS_SMB_ENABLED: false
      PLAYER_LOGS_SMB_HOST: ""
      PLAYER_LOGS_SMB_PORT: 445
      PLAYER_LOGS_SMB_DOMAIN: ""
      PLAYER_LOGS_SMB_USERNAME: ""
      PLAYER_LOGS_SMB_PASSWORD: ""
      PLAYER_LOGS_SMB_SHARE: ""
      PLAYER_LOGS_SMB_DIRECTORY: logs
      PLAYER_LOGS_SMB_FILE_GLOB: player_actions_*.csv
      PLAYER_LOGS_SMB_RECURSIVE: false
    volumes:
      - ./docker-data/synced-logs:/data/synced-logs
    expose:
      - "8080"

  frontend:
    image: ghcr.io/jmcat999/player-frontend:latest
    container_name: player-stats-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "9493:80"
      - "8843:8081"
